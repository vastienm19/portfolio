<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VASTIENM</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Cormorant+Garamond:italic,wght@400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000; color: #fff; font-family: 'Cormorant Garamond', serif; }

        /* LOGO ARRIBA CENTRADO - LIMPIO */
        header {
            position: fixed;
            top: 40px; width: 100%;
            z-index: 100;
            text-align: center;
        }
        header img { height: 65px; }

        /* CADA SERVICIO ES UNA PANTALLA COMPLETA */
        section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            text-align: center;
        }

        /* FOTO DE FONDO - OCUPA TODO SIN BORDES */
        .foto-fondo {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; opacity: 0.35; z-index: -1;
        }

        /* TÍTULOS GIGANTES EN AMARILLO (LINKS) */
        .servicio-link {
            font-family: 'Syne', sans-serif;
            font-size: clamp(3.5rem, 12vw, 7.5rem);
            color: #FFD700;
            text-transform: uppercase;
            text-decoration: none;
            line-height: 0.85;
            transition: 0.4s ease;
        }
        .servicio-link:hover { color: #fff; transform: scale(1.02); }

        .sub-tag {
            font-size: 1.1rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-top: 20px;
            opacity: 0.7;
        }

        /* SECCIONES FINALES */
        .about-text { max-width: 700px; padding: 0 30px; font-size: 2rem; font-style: italic; line-height: 1.3; }
        .ws-btn {
            font-family: 'Syne'; color: #FFD700; border: 1px solid #FFD700;
            padding: 20px 50px; text-decoration: none; letter-spacing: 4px; text-transform: uppercase;
        }
        footer { padding: 60px 0; opacity: 0.3; font-size: 0.8rem; letter-spacing: 4px; }
    </style>
</head>
<body>

    <header>
        <img src="logo.png" alt="VASTIENM">
    </header>

    <section>
        <img src="filmakker.jpg" class="foto-fondo"> <a href="filmmaker.html" class="servicio-link">Filmmaker</a>
        <span class="sub-tag">Visual Storytelling</span>
    </section>

    <section>
        <img src="edicion.png" class="foto-fondo">
        <a href="edicion.html" class="servicio-link">Edición</a>
        <span class="sub-tag">Ritmo y Color</span>
    </section>

    <section>
        <img src="drone.jpg" class="foto-fondo">
        <a href="drone.html" class="servicio-link">Drone</a>
        <span class="sub-tag">Perspectiva Aérea</span>
    </section>

    <section>
        <div class="about-text">
            Soy Sebastian, filmmaker y editor. Busco la calidad estética y la potencia visual en cada proyecto. La música dicta el ritmo.
        </div>
    </section>

    <section>
        <a href="contacto.html" class="ws-btn">Contacto</a>
        <footer style="position: absolute; bottom: 0; width: 100%;">
            NORBERTO DE LA RIESTRA | ARGENTINA
        </footer>
    </section>

</body>
</html>
