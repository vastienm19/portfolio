<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VASTIENM</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            height: 100%; 
            background-color: #000; 
            overflow-x: hidden; 
            font-family: 'Syne', sans-serif;
        }

        /* SECCIÓN DE IMPACTO ÚNICO */
        .hero {
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('filmaker.jpg');
            background-size: cover;
            background-position: center;
        }

        .logo-top {
            position: absolute;
            top: 40px;
            color: #FFD700;
            font-size: 2rem;
            letter-spacing: -1px;
        }

        .titulo-gigante {
            color: #FFD700;
            font-size: clamp(3rem, 18vw, 12rem);
            text-transform: uppercase;
            line-height: 0.8;
            text-decoration: none;
            transition: 0.3s ease;
        }

        .titulo-gigante:hover {
            color: #fff;
            transform: scale(1.02);
        }

        .sub-titulo {
            color: #fff;
            font-size: 1.2rem;
            letter-spacing: 12px;
            text-transform: uppercase;
            margin-top: 20px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="hero">
        <div class="logo-top">VASTIENM</div>
        
        <a href="filmmaker.html" class="titulo-gigante">FILMMAKER</a>
        <p class="sub-titulo">VISUAL STORYTELLER</p>
    </div>

</body>
</html>
