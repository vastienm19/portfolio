<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VASTIENM</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Cormorant+Garamond:italic,wght@400&display=swap" rel="stylesheet">
    <style>
        /* RESET: Limpiamos todo margen para que la foto ocupe todo */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Cormorant Garamond', serif; 
        }

        /* LOGO: Centrado arriba, fijo para que no moleste al bajar */
        header {
            position: fixed;
            top: 40px; width: 100%;
            z-index: 100;
            text-align: center;
        }
        header img { height: 60px; }

        /* SECCIONES: Cada una ocupa el 100% de la pantalla */
        section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            text-align: center;
            overflow: hidden;
        }

        /* FOTOS DE FONDO: Sin bordes, ocupando todo el fondo */
        .bg-foto {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; opacity: 0.4; z-index: -1;
        }

        /* TÍTULOS: El estilo Syne gigante en amarillo */
        .title-link {
            font-family: 'Syne', sans-serif;
            font-size: clamp(3rem, 12vw, 7rem);
            color: #FFD700;
            text-transform: uppercase;
            text-decoration: none;
            line-height: 0.8;
            transition: 0.3s;
        }
        .title-link:hover { color: #fff; }

        .sub-text {
            font-size: 1.2rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-top: 20px;
            opacity: 0.8;
        }

        /* SECCIÓN ABOUT ME */
        .about-content { max-width: 700px; padding: 0 30px; font-size: 2rem; font-style: italic; }

        /* BOTÓN CONTACTO */
        .btn-ws {
            font-family: 'Syne', sans-serif;
            color: #FFD700;
            border: 1px solid #FFD700;
            padding: 20px 50px;
            text-decoration: none;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <header>
        <img src="logo.png.jpeg" alt="VASTIENM">
    </header>

    <section>
        <img src="filmaker.jpg" class="bg-foto">
        <a href="filmmaker.html" class="title-link">Filmmaker</a>
        <span class="sub-text">Captura Cinematográfica</span>
    </section>

    <section>
        <img src="edicion.png" class="bg-foto">
        <a href="edicion.html" class="title-link">Edición</a>
        <span class="sub-text">Narrativa y Color</span>
    </section>

    <section>
        <img src="drone.jpg" class="bg-foto">
        <a href="drone.html" class="title-link">Drone</a>
        <span class="sub-text">Vistas Aéreas 4K</span>
    </section>

    <section>
        <div class="about-content">
            Soy Sebastian, filmmaker y editor. Busco la calidad estética y la potencia visual en cada proyecto.
        </div>
    </section>

    <section>
        <a href="https://wa.me/5491100000000" class="btn-ws">WhatsApp</a>
        <p style="position: absolute; bottom: 40px; opacity: 0.3; letter-spacing: 4px; font-size: 0.7rem;">NORBER
