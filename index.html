<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VASTIENM</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Cormorant+Garamond:italic,wght@400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000; color: #fff; font-family: 'Cormorant Garamond', serif; overflow-x: hidden; }

        /* --- LOGO QUE SE ACHICA AL SCROLLEAR --- */
        header {
            position: fixed;
            top: 0; width: 100%; height: 160px;
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; transition: 0.5s ease-in-out;
        }
        header.scrolled {
            height: 80px; justify-content: flex-start; padding-left: 50px;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
        }
        .logo-img { height: 80px; transition: 0.5s; }
        header.scrolled .logo-img { height: 40px; }

        /* --- SECCIONES DE PANTALLA COMPLETA --- */
        section {
            height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            position: relative; text-align: center;
            border-bottom: 1px solid rgba(255, 215, 0, 0.2); /* El borde que pediste */
        }

        /* FOTO DE FONDO CON OPACIDAD */
        .bg-image {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; opacity: 0.4; z-index: -1;
            transition: transform 0.6s ease;
        }

        /* EFECTO ZOOM AL PASAR EL MOUSE POR LA SECCION */
        section:hover .bg-image { transform: scale(1.1); }

        /* TITULOS GIGANTES AMARILLOS */
        .service-link {
            font-family: 'Syne', sans-serif;
            font-size: clamp(3rem, 15vw, 8rem);
            color: #FFD700;
            text-transform: uppercase;
            text-decoration: none;
            line-height: 0.8;
            transition: 0.3s;
            z-index: 10;
        }
        .service-link:hover { color: #fff; }

        .subtitle {
            font-size: 1.2rem; letter-spacing: 8px;
            text-transform: uppercase; margin-top: 20px;
            opacity: 0.8; color: #fff;
        }

        /* ABOUT Y CONTACTO */
        .content-box { max-width: 800px; padding: 40px; }
        .about-p { font-size: 2.2rem; font-style: italic; line-height: 1.4; }
        
        .btn-ws {
            display: inline-block; margin-top: 30px;
            font-family: 'Syne', sans-serif; color: #FFD700;
            border: 1px solid #FFD700; padding: 20px 60px;
            text-decoration: none; letter-spacing: 4px;
            transition: 0.3s;
        }
        .btn-ws:hover { background: #FFD700; color: #000; }

        footer { padding: 40px; opacity: 0.4; font-size: 0.8rem; letter-spacing: 5px; }
    </style>
</head>
<body>

    <header id="header">
        <img src="logo.png.jpeg" alt="VASTIENM" class="logo-img">
    </header>

    <section>
        <img src="filmaker.jpg" class="bg-image">
        <a href="filmmaker.html" class="service-link">Filmmaker</a>
        <span class="subtitle">Captura Cinematográfica</span>
    </section>

    <section>
        <img src="edicion.png" class="bg-image">
        <a href="edicion.html" class="service-link">Edición</a>
        <span class="subtitle">Narrativa y Color</span>
    </section>

    <section>
        <img src="drone.jpg" class="bg-image">
        <a href="drone.html" class="service-link">Drone</a>
        <span class="subtitle">Vistas Aéreas 4K</span>
    </section>

    <section>
        <div class="content-box">
            <p class="about-p">Soy Sebastian, filmmaker y editor. Busco la calidad estética y la potencia visual en cada proyecto.</p>
        </div>
    </section>

    <section>
        <div class="content-box">
            <h2 style="font-family: 'Syne'; margin-bottom: 20px;">CONTACTO</h2>
            <a href="https://wa.me/5491100000000" class="btn-ws">PEDIR PRESUPUESTO</a>
        </div>
        <footer style="position: absolute; bottom: 0;">NORBERTO DE LA RIESTRA | ARGENTINA</footer>
    </section>

    <script>
        window.onscroll = function() {
            const header = document.getElementById("header");
            if (document.body.scrollTop > 50 || document.documentElement.scrollTop > 50) {
                header.classList.add("scrolled");
            } else {
                header.classList.remove("scrolled");
            }
        };
    </script>

</body>
</html>
