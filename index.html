<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VASTIENM | Filmmaker & Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Cormorant+Garamond:italic,wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --c-yellow: #FFD700;
            --c-black: #0a0a0a;
            --f-title: 'Syne', sans-serif;
            --f-body: 'Cormorant Garamond', serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { background-color: var(--c-black); color: white; font-family: var(--f-body); overflow-x: hidden; }

        /* --- HEADER --- */
        header {
            position: fixed;
            top: 0; width: 100%; height: 100px;
            display: flex; align-items: center; justify-content: center;
            z-index: 1000;
        }
        .logo-img { height: 50px; }

        /* --- SECCIONES FULLSCREEN --- */
        section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
        }

        /* Imágenes de fondo con el toque cinematográfico */
        .bg-img {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; opacity: 0.3; z-index: -1;
            filter: grayscale(50%);
        }

        /* --- TÍTULOS QUE SON LINKS --- */
        .service-link {
            font-family: var(--f-title);
            font-size: clamp(3.5rem, 12vw, 8rem);
            color: var(--c-yellow);
            text-transform: uppercase;
            text-decoration: none;
            letter-spacing: -3px;
            line-height: 0.8;
            transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .service-link:hover {
            color: white;
            letter-spacing: 2px;
            transform: scale(1.02);
        }

        .tag {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 10px;
            opacity: 0.6;
        }

        /* --- ABOUT ME TEXTO ESTILIZADO --- */
        .about-box { max-width: 800px; padding: 0 20px; }
        .about-box p { font-size: 1.8rem; font-style: italic; line-height: 1.3; margin-bottom: 20px; }
        .about-box b { color: var(--c-yellow); font-weight: 600; }

        /* --- BOTÓN WHATSAPP --- */
        .btn-ws {
            font-family: var(--f-title);
            color: var(--c-yellow);
            text-decoration: none;
            border: 1px solid var(--c-yellow);
            padding: 15px 40px;
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .btn-ws:hover { background: var(--c-yellow); color: black; }

        footer { padding-bottom: 40px; opacity: 0.3; font-size: 0.7rem; letter-spacing: 3px; }
    </style>
</head>
<body>

    <header>
        <img src="logo.png.jpeg" alt="VASTIENM" class="logo-img">
    </header>

    <section>
        <img src="filmaker.jpg" class="bg-img">
        <span class="tag">Explore</span>
        <a href="filmmaker.html" class="service-link">Filmmaker</a>
    </section>

    <section>
        <img src="edicion.png" class="bg-img">
        <span class="tag">Edit</span>
        <a href="edicion.html" class="service-link">Edición</a>
    </section>

    <section>
        <img src="drone.jpg" class="bg-img">
        <span class="tag">Fly</span>
        <a href="drone.html" class="service-link">Drone</a>
    </section>

    <section style="background: #050505;">
        <div class="about-box">
            <span class="tag" style="display:block; margin-bottom:30px;">Vastienm</span>
            <p>Soy <b>Sebastian</b>, filmmaker y editor. Busco la <b>calidad estética</b> y la potencia visual en cada proyecto.</p>
            <p>La música dicta el ritmo; la imagen cuenta la historia.</p>
            <a href="about.html" style="color:white; font-size: 0.7rem; letter-spacing: 2px;">DESCUBRIR MÁS</a>
        </div>
    </section>

    <section>
        <h2 style="font-family: var(--f-title); font-size: 3rem; margin-bottom: 40px;">HABLEMOS</h2>
        <a href="https://wa.me/549XXXXXXXXXX?text=Hola%20Sebastian,%20vi%20tu%20web" class="btn-ws" target="_blank">
            WhatsApp Directo
        </a>
        <div style="height: 100px;"></div>
        <footer>NORBERTO DE LA RIESTRA | ARGENTINA</footer>
    </section>

</body>
</html>
