<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VASTIENM</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Cormorant+Garamond:italic,wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --c-yellow: #FFD700;
            --c-black: #000;
            --f-title: 'Syne', sans-serif;
            --f-body: 'Cormorant Garamond', serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { background-color: var(--c-black); color: white; font-family: var(--f-body); overflow-x: hidden; }

        /* --- LOGO DINÁMICO --- */
        header {
            position: fixed;
            top: 0; width: 100%; height: 160px;
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Cuando scrolleás, se va a la esquina y se achica */
        header.scrolled {
            height: 70px;
            justify-content: flex-start;
            padding-left: 40px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
        }

        .logo-img { height: 70px; transition: 0.5s; }
        header.scrolled .logo-img { height: 35px; }

        /* --- SECCIONES --- */
        section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0 10%;
            border-bottom: 1px solid rgba(255, 215, 0, 0.1); /* Borde sutil */
        }

        /* --- SERVICIOS CON ZOOM Y LINK --- */
        .service-container {
            text-decoration: none;
            color: inherit;
            text-align: center;
            transition: transform 0.4s ease;
            display: block;
        }

        .service-container:hover {
            transform: scale(1.05); /* El zoom que pediste */
        }

        .service-title {
            font-family: var(--f-title);
            font-size: clamp(3rem, 12vw, 8rem);
            color: var(--c-yellow);
            text-transform: uppercase;
            letter-spacing: -4px;
            line-height: 0.8;
            transition: 0.3s;
        }

        .service-container:hover .service-title {
            color: white;
        }

        .subtitle {
            font-size: 1.4rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-top: 15px;
            opacity: 0.6;
            font-style: italic;
        }

        /* --- ABOUT ME --- */
        .about-text {
            max-width: 750px;
            font-size: 2rem;
            line-height: 1.3;
            text-align: center;
            font-style: italic;
        }
        .about-text b { color: var(--c-yellow); font-weight: 500; }

        /* --- CONTACTO / BOTÓN WS --- */
        .btn-ws {
            font-family: var(--f-title);
            color: var(--c-yellow);
            text-decoration: none;
            border: 1px solid var(--c-yellow);
            padding: 20px 50px;
            font-size: 0.9rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .btn-ws:hover { background: var(--c-yellow); color: black; }

        footer { padding: 50px 0; opacity: 0.2; font-size: 0.7rem; letter-spacing: 5px; }

    </style>
</head>
<body>

    <header id="main-header">
        <img src="logo.png.jpeg" alt="VASTIENM" class="logo-img">
    </header>

    <section>
        <a href="edicion.html" class="service-container">
            <h2 class="service-title">Edición</h2>
            <span class="subtitle">Narrativa & Color</span>
        </a>
    </section>

    <section>
        <a href="filmmaker.html" class="service-container">
            <h2 class="service-title">Filmmaker</h2>
            <span class="subtitle">Captura Cinematográfica</span>
        </a>
    </section>

    <section>
        <section style="height: auto; border: none; padding: 0;">
            <a href="drone.html" class="service-container">
                <h2 class="service-title">Drone</h2>
                <span class="subtitle">Perspectivas Aéreas</span>
            </a>
        </section>
    </section>

    <section>
        <div class="about-text">
            Soy <b>Sebastian</b>, filmmaker y editor. Busco la calidad estética y la potencia visual en cada proyecto. La música dicta el ritmo.
        </div>
    </section>

    <section>
        <h2 style="font-family: var(--f-title); margin-bottom: 30px;">CONTACTO</h2>
        <a href="https://wa.me/5491100000000" class="btn-ws">Pedir Presupuesto</a>
        <footer style="margin-top: 100px;">NORBERTO DE LA RIESTRA | ARGENTINA</footer>
    </section>

    <script>
        // Lógica del logo: se achica y va a la esquina al scrollear
        window.addEventListener('scroll', function() {
            const header = document.getElementById('main-header');
            if (window.scrollY > 80) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        });
    </script>

</body>
</html>
