<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VASTIENM | Visual Storyteller</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Cormorant+Garamond:italic,wght@500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --c-yellow: #FFD700;
            --c-black: #0a0a0a;
            --f-title: 'Syne', sans-serif;
            --f-body: 'Cormorant Garamond', serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        
        body { 
            background-color: var(--c-black); 
            color: white; 
            font-family: var(--f-body); 
            overflow-x: hidden;
        }

        /* --- LOGO DISEÑADO --- */
        header {
            position: fixed;
            top: 0; width: 100%;
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .logo-container { text-align: center; transition: 0.6s; }
        
        .logo-main {
            font-family: var(--f-title);
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--c-yellow);
            text-transform: uppercase;
            letter-spacing: -4px;
            line-height: 0.75;
            display: block;
        }
        
        .logo-sub {
            font-family: var(--f-body);
            font-size: 1.2rem;
            font-style: italic;
            color: #fff;
            display: block;
            margin-top: 5px;
            letter-spacing: 1px;
        }

        /* Estado Scroll */
        header.scrolled {
            height: 70px;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(10px);
            justify-content: flex-start;
            padding-left: 30px;
        }
        header.scrolled .logo-main { font-size: 1.4rem; letter-spacing: -1px; }
        header.scrolled .logo-sub { font-size: 0.7rem; margin-top: 1px; }

        /* --- SECCIONES --- */
        section {
            height: 100vh;
            padding: 100px 30px 30px 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .border-frame {
            position: relative;
            width: 100%; height: 100%;
            border: 1px solid rgba(255, 215, 0, 0.15);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            background-color: #151515;
        }

        /* QUITAMOS EL LINK AZUL SUBRAYADO */
        .service-link {
            text-decoration: none;
            color: inherit;
            display: block;
            position: relative;
            z-index: 20;
        }

        .bg-img {
            position: absolute;
            width: calc(100% - 20px);
            height: calc(100% - 20px);
            object-fit: cover;
            opacity: 0.4;
            transition: 1s ease;
        }

        .content { position: relative; z-index: 10; text-align: center; }

        h2 {
            font-family: var(--f-title);
            font-size: clamp(2rem, 8vw, 3.5rem);
            text-transform: uppercase;
            color: var(--c-yellow);
            line-height: 0.9;
        }
