<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VASTIENM</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000; color: #fff; font-family: 'Syne', sans-serif; }

        /* SECCIONES DE PANTALLA COMPLETA */
        section {
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
        }

        /* FOTO DE FONDO */
        .foto {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0.5; /* Oscurece la foto para que se lea el texto */
            z-index: 1;
        }

        /* TEXTO AMARILLO GIGANTE */
        .contenido {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        h1 {
            font-size: clamp(3rem, 15vw, 9rem);
            color: #FFD700;
            text-transform: uppercase;
            line-height: 0.8;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2rem;
            letter-spacing: 10px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        /* LOGO FIJO */
        .logo-fijo {
            position: fixed;
            top: 30px;
            width: 100%;
            text-align: center;
            z-index: 100;
            font-size: 1.5rem;
            color: #FFD700;
            letter-spacing: 5px;
        }
    </style>
</head>
<body>

    <div class="logo-fijo">VASTIENM</div>

    <section>
        <img src="filmaker.jpg" class="foto">
        <div class="contenido">
            <h1>FILMMAKER</h1>
            <p>Visual Storyteller</p>
        </div>
    </section>

    <section>
        <img src="edicion.png" class="foto">
        <div class="contenido">
            <h1>EDICIÓN</h1>
            <p>Narrativa & Color</p>
        </div>
    </section>

    <section>
        <img src="drone.jpg" class="foto">
        <div class="contenido">
            <h1>DRONE</h1>
            <p>Vistas Aéreas</p>
        </div>
    </section>

</body>
</html>
