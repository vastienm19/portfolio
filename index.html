<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VASTIENM</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Cormorant+Garamond:italic,wght@400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000; color: #fff; font-family: 'Cormorant Garamond', serif; }

        /* LOGO ARRIBA CENTRADO SIEMPRE */
        header {
            position: fixed;
            top: 0; width: 100%;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        header img { height: 60px; }

        /* CADA SECCIÓN OCUPA TODA LA PANTALLA */
        section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            text-align: center;
        }

        /* FOTO DE FONDO CON OPACIDAD PARA QUE SE LEA EL TEXTO */
        .foto-fondo {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; opacity: 0.4; z-index: -1;
        }

        /* NOMBRE DEL SERVICIO (LINK) */
        .servicio-link {
            font-family: 'Syne', sans-serif;
            font-size: 5rem;
            color: #FFD700;
            text-transform: uppercase;
            text-decoration: none;
            line-height: 0.8;
            transition: 0.3s;
        }
        .servicio-link:hover { color: #fff; }

        .subtitulo {
            font-size: 1.2rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-top: 15px;
            opacity: 0.8;
        }

        /* ABOUT Y CONTACTO */
        .texto-about { max-width: 600px; padding: 20px; font-size: 1.8rem; font-style: italic; }
        .boton-ws {
            color: #FFD700; border: 1px solid #FFD700; padding: 15px 40px;
            text-decoration: none; font-family: 'Syne'; font-size: 0.8rem; letter-spacing: 3px;
        }
    </style>
</head>
<body>

    <header>
        <img src="logo.png.jpeg" alt="VASTIENM">
    </header>

    <section>
        <img src="edicion.png" class="foto-fondo">
        <a href="edicion.html" class="servicio-link">Edición</a>
        <span class="subtitulo">Post-producción & Color</span>
    </section>

    <section>
        <img src="filmaker.jpg" class="foto-fondo">
        <a href="filmmaker.html" class="servicio-link">Filmmaker</a>
        <span class="subtitulo">Captura Cinematográfica</span>
    </section>

    <section>
        <img src="drone.jpg" class="foto-fondo">
        <a href="drone.html" class="servicio-link">Drone</a>
        <span class="subtitulo">Perspectivas Aéreas</span>
    </section>

    <section>
        <div class="texto-about">
            Soy Sebastian, filmmaker y editor. Busco la calidad estética y la potencia visual en cada proyecto.
        </div>
    </section>

    <section>
        <a href="https://wa.me/5491100000000" class="boton-ws">WHATSAPP</a>
    </section>

</body>
</html>
